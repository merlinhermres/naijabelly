<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaijaBelly - Nigerian Food Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#FFF6E9;
color:#3b2f2f;
}

header{
background:#E07B39;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
}

.food-card{
background:white;
border-radius:16px;
overflow:hidden;
transition:all .35s ease;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.food-card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 18px 35px rgba(0,0,0,.18);
}

.image-box{
height:180px;
overflow:hidden;
}

.food-image{
width:100%;
height:100%;
object-fit:cover;
transition:transform .6s ease;
}

.food-card:hover .food-image{
transform:scale(1.12);
}

.food-info{
padding:18px;
}

.food-title{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.price{
color:#E07B39;
font-weight:bold;
margin-bottom:10px;
}

button{
border:none;
padding:10px 16px;
background:#E07B39;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#c86428;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:white;
padding:10px 16px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,.2);
}

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
font-size:28px;
padding:16px;
border-radius:50%;
box-shadow:0 6px 20px rgba(0,0,0,.25);
}

.whatsapp:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<header>NaijaBelly Nigerian Food Menu</header>

<div class="cart">
🛒 Cart: <span id="cart-count">0</span>
</div>

<div class="container" id="menu"></div>

<a class="whatsapp" href="https://wa.me/2348143002152" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>

let cartCount=0

const foods=[

{name:"Jollof Rice",price:2500},
{name:"Fried Rice",price:2400},
{name:"Egusi Soup",price:2600},
{name:"Ogbono Soup",price:2500},
{name:"Afang Soup",price:2700},
{name:"Banga Soup",price:2600},
{name:"Efo Riro",price:2500},
{name:"Suya",price:2000},
{name:"Puff Puff",price:1200},
{name:"Moi Moi",price:1500},
{name:"Akara",price:1000},
{name:"Pepper Soup",price:2200},
{name:"Amala",price:1800},
{name:"Pounded Yam",price:2000},
{name:"Eba",price:1500},
{name:"Boli",price:1400},
{name:"Coconut Rice",price:2600},
{name:"Ofada Rice",price:2700},
{name:"Beans and Dodo",price:2000},
{name:"Yam Porridge",price:2100}

]

const menu=document.getElementById("menu")

foods.forEach(food=>{

let image=`https://source.unsplash.com/600x400/?nigerian,${encodeURIComponent(food.name)}`

menu.innerHTML+=`

<div class="food-card">

<div class="image-box">

<img 
src="${image}" 
class="food-image"
loading="lazy"
decoding="async"
onerror="this.src='https://via.placeholder.com/400x300/E07B39/FFFFFF?text=${encodeURIComponent(food.name)}'"
>

</div>

<div class="food-info">

<div class="food-title">${food.name}</div>

<div class="price">₦${food.price}</div>

<button onclick="addCart()">Add to Cart</button>

</div>

</div>

`

})

function addCart(){
cartCount++
document.getElementById("cart-count").innerText=cartCount
}

</script>

</body>
</html>
